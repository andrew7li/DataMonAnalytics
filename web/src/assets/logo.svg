<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="dmTitle dmDesc">
  <title id="dmTitle">DataMon Icon</title>
  <desc id="dmDesc">A round data-monster mascot with an ascending bar graph on its chest.</desc>
  <defs>
    <linearGradient id="dmGradient" x1="20" y1="15" x2="100" y2="115" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D63FF"/>
      <stop offset="0.52" stop-color="#315DFF"/>
      <stop offset="1" stop-color="#7A3FF2"/>
    </linearGradient>
  </defs>

  <!-- ears -->
  <path d="M28 34C24 16 38 6 48 22L52 34H28Z" fill="url(#dmGradient)"/>
  <path d="M92 34C96 16 82 6 72 22L68 34H92Z" fill="url(#dmGradient)"/>

  <!-- head / body -->
  <circle cx="60" cy="66" r="40" fill="url(#dmGradient)"/>

  <!-- eyes -->
  <circle cx="42" cy="50" r="8" fill="white"/>
  <circle cx="78" cy="50" r="8" fill="white"/>
  <circle cx="44" cy="51" r="3.4" fill="#1B2B5C"/>
  <circle cx="80" cy="51" r="3.4" fill="#1B2B5C"/>

  <!-- ascending bar graph -->
  <rect x="40" y="80" width="10" height="20" rx="3" fill="white"/>
  <rect x="55" y="70" width="10" height="30" rx="3" fill="white"/>
  <rect x="70" y="60" width="10" height="40" rx="3" fill="white"/>
</svg>
